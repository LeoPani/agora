services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agora_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agora
      POSTGRES_PASSWORD: agora_dev
      POSTGRES_DB: agora
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agora -d agora"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
